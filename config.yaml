api_version: "0.1"

apps:
  one:
    path_prefix: "/one"

    authN:
      - type: password_based
        url: "/login"
        config:
          main_hasher: argon2
          compat_hashers: []
          collection: identity
          user_unique: "{$.name}"
          user_confirm: "{$.passwd}"

    authZ:
      type: cookie
      config:
        storage: one_db
        collection:
        domain: "localhost"
        path: "/"
        max_age: 3600
        secure: true
        http_only: false

    identity_flows:
      - type: register
        login_after: true
        fields:
          user_unique: "{$.name}"
          user_confirm: "{$.passwd}"
          email: "{$.email}"


  two:
    path_prefix: "/two"

    main:
      use_existent_collection: true
      user_collection:
        storage: "main_db"
        name: "users"
        pk: "id"
        user_unique: "username"
        user_confirm: "password"

      authN:
          - type: password_based
            config:
              user_unique: "{$.name}"
              user_confirm: "{$.passwd}"

      authZ:
        jwt:
          alg: "RS256"
          keys:
            - driver: "file"
              params:
                paths:
                  - ./private.pem
          kid_alg: "docker_registry" # implement docker_registry and default and none
          payload:
            "$.userID": "id"
      #     "$.userPosts": "@getUserPosts" raw querie

      register:
        login_after: true
        auth_type: "jwt"
        fields:
          user_unique: "{$.name}"
          user_confirm: "{$.passwd}"
          email: "{$.email}"

    hasher:
      alg: "pbkdf2"
      settings:
        iterations: 1
        salt_length: 16
        key_length: 16
        func: "sha1"

storages:
  - name: one_db
    config:
      connection_url: "postgresql://root:password@localhost:5432/test?sslmode=disable&search_path=public"

  - name: two_db
    config:
      adapter: "postgresql"
      username: "root"
      password: "password"
      host: "localhost"
      port: "5432"
      db_name: "test"
      options:
        sslmode: "disable"
        search_path: "public"

collections:
  - type: identity
    name: identity
    storage: one_db
    config:
      use_existent: false
      name: "users"
      pk: "id"
      user_unique: "username"
      user_confirm: "password"

  - type: session
    name: session
    storage: one_db
    config:
      use_existent: false
      name: "sessions"
      pk: "id"
      # todo: fill rest

hashers:
  - type: argon2
    name: argon2
    config:
      kind: "argon2i"
      iterations: 1
      parallelism: 1
      salt_length: 16
      key_length: 16
      memory: 16384
